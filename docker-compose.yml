version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./maintenance.db
      - JWT_SECRET_KEY=demo-secret-key-replace-in-production
      - SIMULATOR_INTERVAL_SECONDS=2.0
    volumes:
      - backend-data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
